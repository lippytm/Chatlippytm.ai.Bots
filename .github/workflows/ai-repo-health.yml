name: AI Swarm – Repo Health Report

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      repos:
        description: "Comma-separated owner/repo targets (leave blank for current)"
        required: false
        default: ""

jobs:
  health-report:
    name: Repository Health Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run repo scanner swarm
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPOS="${{ github.event.inputs.repos }}"
          if [ -z "$REPOS" ]; then
            REPOS="${{ github.repository }}"
          fi
          python main.py swarm \
            --repos "$REPOS" \
            --agents "RepoScannerAgent" \
            --output /tmp/health_results.json

      - name: Post health report as issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import json, subprocess, sys

          with open("/tmp/health_results.json") as f:
              results = json.load(f)

          for r in results:
              if r.get("status") != "ok":
                  continue
              report = r.get("result", {}).get("report", "")
              repo = r.get("result", {}).get("repo", "unknown")
              if not report:
                  continue
              import subprocess
              subprocess.run([
                  "gh", "issue", "create",
                  "--title", f"📊 Weekly Health Report: {repo}",
                  "--body", f"## Repository Health Report\n\n{report}\n\n---\n*Generated by Chatlippytm.ai.Bots RepoScannerAgent*",
                  "--label", "documentation",
              ], check=False)
          EOF
