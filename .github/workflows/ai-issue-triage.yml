name: AI Swarm – Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    name: AI Issue Triage
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI triage
        id: triage
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import json, os, sys
          from agents import IssueTriageAgent

          agent = IssueTriageAgent()
          result = agent.run({
              "repo": "${{ github.repository }}",
              "issue_number": ${{ github.event.issue.number }},
              "title": "${{ github.event.issue.title }}",
              "body": """${{ github.event.issue.body }}""",
          })

          triage = result.get("triage", {})
          # Persist results for subsequent steps
          with open("/tmp/triage.json", "w") as f:
              json.dump(triage, f)

          print(json.dumps(triage, indent=2))
          EOF

      - name: Apply labels
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(python -c "
          import json
          with open('/tmp/triage.json') as f:
              t = json.load(f)
          print(','.join(t.get('labels', [])))
          ")
          if [ -n "$LABELS" ]; then
            gh issue edit ${{ github.event.issue.number }} \
              --add-label "$LABELS" || true
          fi

      - name: Post triage comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT=$(python -c "
          import json
          with open('/tmp/triage.json') as f:
              t = json.load(f)
          print(t.get('triage_comment', ''))
          ")
          PRIORITY=$(python -c "
          import json
          with open('/tmp/triage.json') as f:
              t = json.load(f)
          print(t.get('priority', 'medium'))
          ")
          gh issue comment ${{ github.event.issue.number }} \
            --body "## 🤖 AI Triage (Chatlippytm.ai.Bots)

          **Priority:** ${PRIORITY}

          ${COMMENT}

          ---
          *Generated by [Chatlippytm.ai.Bots](https://github.com/${{ github.repository }}) AI Agent Swarm*"
