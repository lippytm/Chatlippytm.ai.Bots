name: AI Swarm – Security Scan

on:
  push:
    branches: [main]
  schedule:
    # Daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  security-scan:
    name: AI Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI security scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import sys
          from agents import SecurityAgent

          agent = SecurityAgent()
          result = agent.run({
              "repo": "${{ github.repository }}",
              "max_files": 50,
          })

          report = result.get("report", "No security issues found.")
          with open("/tmp/security_report.md", "w") as f:
              f.write(report)

          print(report)
          EOF

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_number }}
          path: /tmp/security_report.md
          retention-days: 30

      - name: Open issue on critical findings
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(cat /tmp/security_report.md)
          # Only open an issue if CRITICAL or HIGH findings are mentioned
          if echo "$REPORT" | grep -qi "CRITICAL\|HIGH"; then
            gh issue create \
              --title "🔒 AI Security Scan: Critical/High findings detected (run #${{ github.run_number }})" \
              --body "## AI Security Scan Report

          ${REPORT}

          ---
          *Generated by [Chatlippytm.ai.Bots](https://github.com/${{ github.repository }}) SecurityAgent – run #${{ github.run_number }}*" \
              --label "security" || true
          fi
