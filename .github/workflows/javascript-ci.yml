name: JavaScript CI

on:
  push:
    paths:
      - "modules/javascript/**"
      - "config/**"
      - ".github/workflows/javascript-ci.yml"
  pull_request:
    paths:
      - "modules/javascript/**"
      - "config/**"
      - ".github/workflows/javascript-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: modules/javascript/package.json

      - name: Install dependencies
        working-directory: modules/javascript
        run: npm install

      - name: Run tests
        working-directory: modules/javascript
        run: node --test tests/ai_integration.test.js
