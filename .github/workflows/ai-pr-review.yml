name: AI Swarm – Pull Request Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
          echo "diff_file=/tmp/pr.diff" >> "$GITHUB_OUTPUT"

      - name: Run AI code review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'EOF'
          import json, os, sys
          from agents import CodeReviewAgent

          with open("/tmp/pr.diff") as f:
              diff = f.read()

          agent = CodeReviewAgent()
          result = agent.run({
              "repo": "${{ github.repository }}",
              "pr_number": ${{ github.event.pull_request.number }},
              "diff": diff,
              "title": "${{ github.event.pull_request.title }}",
          })

          review = result.get("review", "")
          # Write to file for next step
          with open("/tmp/review.md", "w") as f:
              f.write(review)

          if result.get("status") != "ok":
              sys.exit(1)
          EOF

      - name: Post review comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat /tmp/review.md)
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## 🤖 AI Code Review (Chatlippytm.ai.Bots)

          ${BODY}

          ---
          *Generated by [Chatlippytm.ai.Bots](https://github.com/${{ github.repository }}) AI Agent Swarm*"
