# Swarm & Agent configuration
swarm:
  max_agents: 10
  concurrency: 4
  task_timeout: 300           # seconds per agent task
  retry_attempts: 3
  heartbeat_interval: 30      # seconds between agent health checks

agents:
  default_model: gpt-4o
  temperature: 0.2
  max_tokens: 4096
  max_iterations: 15
  verbose: false
  tools:
    - code_analysis
    - repo_scanner
    - issue_creator
    - pr_reviewer
    - ci_trigger
    - test_runner
    - dependency_auditor
    - security_scanner
    - workshop_manager
    - sandbox_provisioner

training:
  model: gpt-4o
  auto_train_on_push: true
  training_data_path: training/data
  fine_tune_threshold: 100    # min examples before fine-tuning
  evaluation_split: 0.2

repositories:
  # Add GitHub repos the swarm should manage
  # Format: owner/repo
  targets: []

# ---------------------------------------------------------------------------
# AI BrainKit – portable workflow distribution
# ---------------------------------------------------------------------------

brainkit:
  # Repositories that should receive the AI BrainKit workflows.
  # The BrainKitAgent reads this list when invoked via the swarm or CLI.
  # Format: owner/repo
  targets: []
  # Default branch to commit BrainKit files to in target repos
  default_branch: main
  # Workflows to install (comment out any you don't need)
  workflows:
    - ai-pr-review
    - ai-security-scan
    - ai-issue-triage
    - ai-repo-health
    - auto-train

# ---------------------------------------------------------------------------
# Web3 Workshop Platform
# ---------------------------------------------------------------------------

web3:
  enabled: true
  session_ttl_seconds: 3600       # wallet session duration
  challenge_ttl_seconds: 300      # sign-in challenge validity window
  # In production, set WEB3_SECRET_KEY env var to a long random secret
  token_registry:
    enabled: true
    default_award_amount: 1       # tokens awarded per milestone
    token_names:
      - workshop_completion
      - assignment_pass
      - peer_review
      - streak_bonus

workshop:
  templates_path: workshop/templates   # optional local template overrides
  grading:
    default_rubric: "Correctness, code quality, clarity, best-practices"
    pass_threshold: 70               # minimum score (0-100) to pass
  copilot_integration:
    enabled: true                    # embed GitHub Copilot-style hints
    hint_on_grade: true              # include a code hint in grading feedback
  task_guides:
    skill_levels:
      - beginner
      - intermediate
      - advanced
  automation:
    auto_grade_on_submit: true
    send_feedback_to_participant: true

sandbox:
  cpu_limit: 1.0        # fractional CPU cores per sandbox
  memory_mb: 512        # RAM per sandbox in MB
  available_modules:
    - coding
    - ai_experimentation
    - blockchain_dev
  max_sandboxes_per_user: 3
  idle_timeout_minutes: 30

pipelines:
  - name: code_review
    trigger: pull_request
    agents:
      - pr_reviewer
      - security_scanner
  - name: dependency_audit
    trigger: schedule
    cron: "0 2 * * 1"        # every Monday at 2 AM
    agents:
      - dependency_auditor
  - name: issue_triage
    trigger: issues
    agents:
      - issue_triager
  - name: auto_train
    trigger: push
    branch: main
    agents:
      - trainer
  - name: workshop_automation
    trigger: workflow_dispatch
    agents:
      - workshop_manager
      - sandbox_provisioner
