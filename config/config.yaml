# Swarm & Agent configuration
swarm:
  max_agents: 20
  concurrency: 4
  task_timeout: 300           # seconds per agent task
  retry_attempts: 3
  heartbeat_interval: 30      # seconds between agent health checks

agents:
  default_model: gpt-4o
  temperature: 0.2
  max_tokens: 4096
  max_iterations: 15
  verbose: false
  tools:
    - code_analysis
    - repo_scanner
    - issue_creator
    - pr_reviewer
    - ci_trigger
    - test_runner
    - dependency_auditor
    - security_scanner
    - trading_bot
    - diagnostics
    - sandbox
    - doc_generator
    - database_manager
    - api_learner

training:
  model: gpt-4o
  auto_train_on_push: true
  training_data_path: training/data
  fine_tune_threshold: 100    # min examples before fine-tuning
  evaluation_split: 0.2

sandbox:
  default_isolation: strict
  resource_limits:
    cpu_cores: 2
    memory_mb: 512
    timeout_s: 300
  rl_defaults:
    algorithm: PPO
    episodes: 100
    learning_rate: 0.0003

trading:
  sandbox_mode: true          # set false only for live trading
  supported_asset_classes:
    - crypto
    - stocks
    - forex
  default_risk_level: medium
  max_position_size: 0.1      # 10 % of portfolio per trade

repositories:
  # Add GitHub repos the swarm should manage
  # Format: owner/repo
  targets: []

pipelines:
  - name: code_review
    trigger: pull_request
    agents:
      - pr_reviewer
      - security_scanner
  - name: dependency_audit
    trigger: schedule
    cron: "0 2 * * 1"        # every Monday at 2 AM
    agents:
      - dependency_auditor
  - name: issue_triage
    trigger: issues
    agents:
      - issue_triager
  - name: auto_train
    trigger: push
    branch: main
    agents:
      - trainer
  - name: diagnostics
    trigger: push
    agents:
      - diagnostics
  - name: doc_generation
    trigger: push
    branch: main
    agents:
      - doc_generator
  - name: trading_signals
    trigger: schedule
    cron: "0 * * * *"       # hourly (adjust frequency to match strategy needs)
    agents:
      - trading_bot
  - name: api_learning
    trigger: schedule
    cron: "0 3 * * *"        # daily at 3 AM
    agents:
      - api_learner
